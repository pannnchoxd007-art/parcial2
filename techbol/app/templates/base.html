<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechBol - {% block title %}Sistema de Gestión{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .navbar-brand { font-weight: 700; font-size: 1.4rem; }
        .sidebar {
            min-height: calc(100vh - 56px);
            background: #1a1a2e;
            padding-top: 1rem;
        }
        .sidebar .nav-link {
            color: #a0aec0;
            border-radius: 8px;
            margin: 2px 8px;
            transition: all 0.2s;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            background: #16213e;
            color: #fff;
        }
        .sidebar .nav-link i { margin-right: 8px; }
        .sidebar .nav-section {
            color: #4a5568;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 0.5rem 1rem;
            margin-top: 0.5rem;
        }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
        .card-header { border-radius: 12px 12px 0 0 !important; font-weight: 600; }
        .btn { border-radius: 8px; }
        .table th { font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.04em; color: #718096; }
        .badge-stock { font-size: 0.8rem; }
        .page-title { font-weight: 700; color: #1a1a2e; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="/"><i class="bi bi-box-seam me-2"></i>TechBol</a>
    <span class="text-secondary small">TEM-742 Tecnologías Emergentes II</span>
</nav>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar d-none d-md-block p-0">
            <div class="p-2">
                <div class="nav-section">Módulos</div>
                <nav class="nav flex-column">
                    <a class="nav-link {% if request.blueprint == 'bp_productos' %}active{% endif %}"
                       href="{{ url_for('bp_productos.listar') }}">
                        <i class="bi bi-box"></i> Productos
                    </a>
                    <a class="nav-link {% if request.blueprint == 'bp_clientes' %}active{% endif %}"
                       href="{{ url_for('bp_clientes.listar') }}">
                        <i class="bi bi-people"></i> Clientes
                    </a>
                    <a class="nav-link {% if request.blueprint == 'bp_pedidos' %}active{% endif %}"
                       href="{{ url_for('bp_pedidos.listar') }}">
                        <i class="bi bi-cart3"></i> Pedidos
                    </a>
                </nav>
            </div>
        </div>

        <!-- Main content -->
        <div class="col-md-10 py-4 px-4">
            <!-- Alertas flash -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            {% block content %}{% endblock %}
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
