{% extends 'base.html' %}
{% block title %}{% if producto %}Editar{% else %}Nuevo{% endif %} Producto{% endblock %}

{% block content %}
<div class="mb-4">
    <a href="{{ url_for('bp_productos.listar') }}" class="text-decoration-none text-muted">
        <i class="bi bi-arrow-left me-1"></i> Volver a Productos
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <i class="bi bi-box me-2"></i>
                {% if producto %}Editar Producto{% else %}Nuevo Producto{% endif %}
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nombre</label>
                        <input type="text" name="nombre" class="form-control"
                               value="{{ producto.nombre if producto else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Precio (Bs.)</label>
                        <input type="number" name="precio" class="form-control" step="0.01" min="0"
                               value="{{ producto.precio if producto else '' }}" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Stock</label>
                        <input type="number" name="stock" class="form-control" min="0"
                               value="{{ producto.stock if producto else '' }}" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-1"></i>
                            {% if producto %}Guardar Cambios{% else %}Crear Producto{% endif %}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
