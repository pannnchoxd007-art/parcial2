{% extends 'base.html' %}
{% block title %}{% if cliente %}Editar{% else %}Nuevo{% endif %} Cliente{% endblock %}

{% block content %}
<div class="mb-4">
    <a href="{{ url_for('bp_clientes.listar') }}" class="text-decoration-none text-muted">
        <i class="bi bi-arrow-left me-1"></i> Volver a Clientes
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-success text-white">
                <i class="bi bi-person me-2"></i>
                {% if cliente %}Editar Cliente{% else %}Nuevo Cliente{% endif %}
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nombre</label>
                        <input type="text" name="nombre" class="form-control"
                               value="{{ cliente.nombre if cliente else '' }}" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Teléfono</label>
                        <input type="text" name="telefono" class="form-control"
                               value="{{ cliente.telefono if cliente else '' }}" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-save me-1"></i>
                            {% if cliente %}Guardar Cambios{% else %}Crear Cliente{% endif %}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
