{% extends 'base.html' %}
{% block title %}{% if pedido %}Editar{% else %}Nuevo{% endif %} Pedido{% endblock %}

{% block content %}
<div class="mb-4">
    <a href="{{ url_for('bp_pedidos.listar') }}" class="text-decoration-none text-muted">
        <i class="bi bi-arrow-left me-1"></i> Volver a Pedidos
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-warning text-dark">
                <i class="bi bi-cart3 me-2"></i>
                {% if pedido %}Editar Pedido{% else %}Nuevo Pedido{% endif %}
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Cliente</label>
                        <select name="cliente_id" class="form-select" required>
                            <option value="">-- Selecciona un cliente --</option>
                            {% for c in clientes %}
                            <option value="{{ c.id }}"
                                {% if pedido and pedido.cliente_id == c.id %}selected{% endif %}>
                                {{ c.nombre }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Producto</label>
                        <select name="producto_id" class="form-select" required>
                            <option value="">-- Selecciona un producto --</option>
                            {% for p in productos %}
                            <option value="{{ p.id }}"
                                {% if pedido and pedido.producto_id == p.id %}selected{% endif %}>
                                {{ p.nombre }} — Bs. {{ "%.2f"|format(p.precio) }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Monto (Bs.)</label>
                        <input type="number" name="monto" class="form-control" step="0.01" min="0"
                               value="{{ pedido.monto if pedido else '' }}" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-warning text-dark fw-semibold">
                            <i class="bi bi-save me-1"></i>
                            {% if pedido %}Guardar Cambios{% else %}Crear Pedido{% endif %}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
